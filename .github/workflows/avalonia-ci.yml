name: Monica by Avalonia

on:
  push:
    paths:
      - "monica by avalonia/**"
      - ".github/workflows/avalonia-ci.yml"
  pull_request:
    paths:
      - "monica by avalonia/**"
      - ".github/workflows/avalonia-ci.yml"
  workflow_dispatch:

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "monica by avalonia"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Monica.slnx

      - name: Format check
        run: dotnet format Monica.slnx --verify-no-changes --no-restore --exclude-diagnostics DAP018

      - name: Build
        run: dotnet build Monica.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Monica.slnx -c Release --no-build --logger trx

  native-aot:
    name: Native AOT ${{ matrix.rid }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: Monica-win-x64
          - rid: osx-x64
            os: macos-14
            artifact: Monica-osx-x64
          - rid: osx-arm64
            os: macos-14
            artifact: Monica-osx-arm64
          - rid: linux-x64
            os: ubuntu-24.04
            artifact: Monica-linux-x64
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            artifact: Monica-linux-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: "monica by avalonia"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Monica.slnx

      - name: Publish Native AOT
        run: dotnet publish src/Monica.App/Monica.App.csproj -c Release -r ${{ matrix.rid }} /p:PublishAot=true /p:SelfContained=true -o artifacts/${{ matrix.rid }}

      - name: Checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem artifacts/${{ matrix.rid }} -Recurse -File |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $($_.Path.Replace((Resolve-Path artifacts/${{ matrix.rid }}).Path + [IO.Path]::DirectorySeparatorChar, ''))" } |
            Set-Content artifacts/${{ matrix.rid }}/SHA256SUMS.txt

      - name: Checksums (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          (cd artifacts/${{ matrix.rid }} && find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: monica by avalonia/artifacts/${{ matrix.rid }}
