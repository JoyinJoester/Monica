name: Android Preview Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**.kt'
      - 'Monica for Android/**.java'
      - 'Monica for Android/**.xml'
      - 'Monica for Android/**.gradle'
      - 'Monica for Android/**.kts'
      - 'Monica for Android/gradle/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**.kt'
      - 'Monica for Android/**.java'
      - 'Monica for Android/**.xml'
      - 'Monica for Android/**.gradle'
      - 'Monica for Android/**.kts'
      - 'Monica for Android/gradle/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-preview:
    name: Build & Publish Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Monica for Android"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Monica for Android/**/*.gradle*', 'Monica for Android/**/gradle-wrapper.properties') }}
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Decode keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.jks
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Generate preview version suffix
        run: echo "PREVIEW_VERSION_SUFFIX=build.$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          ./gradlew :app:assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.DEBUG_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.DEBUG_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.DEBUG_KEY_PASSWORD }} \
            -PpreviewVersionSuffix=$PREVIEW_VERSION_SUFFIX
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          mv app-release.apk Monica-Android-Preview-${PREVIEW_VERSION_SUFFIX}.apk
        continue-on-error: true

      - name: Delete existing preview release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view preview >/dev/null 2>&1; then
            gh release delete preview --yes --cleanup-tag
          else
            echo "No existing preview release to delete"
          fi

      - name: Move preview tag to current commit
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa preview ${{ github.sha }} -m "Development Preview"
          git push origin refs/tags/preview --force

      - name: Publish Preview to Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: "⚠️ Development Preview (${{ env.PREVIEW_VERSION_SUFFIX }})"
          body: |
            > **⚠️ 注意：这是一个自动构建的开发预览版本 (Development Preview)**
            > 
            > 此版本用于快速体验最新代码，可能包含未完成的功能或 Bug。
            > 正式使用请下载下面的 Stable 版本。
            > 但是实际上 Stable 版本可能不如这个预览版本更新，毕竟 Stable 版本需要经过更多的测试和验证。
            > 预览版本可能会更快地包含最新的功能和修复，但也可能更不稳定。
            > ---
            > **构建信息：**
            > *   **Build Suffix**: `${{ env.PREVIEW_VERSION_SUFFIX }}`
            > *   **Commit SHA**: `${{ github.sha }}`
            > *   **Ref**: `${{ github.ref }}`
          files: |
            Monica for Android/app/build/outputs/apk/release/*.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
