name: Update GitHub commits

on:
  schedule:
    - cron: "18 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub commits
        run: node scripts/fetch-github-commits.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated data
        run: |
          if git diff --quiet -- MonicaDocs/docs/public/github-commits.json; then
            echo "No GitHub commit data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MonicaDocs/docs/public/github-commits.json
          git commit -m "chore: update github commit data"
          git push
