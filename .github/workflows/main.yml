name: Android CI debug

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.gradle.kts'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
      - 'Monica for Android/gradlew'
      - 'Monica for Android/gradlew.bat'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.gradle.kts'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
      - 'Monica for Android/gradlew'
      - 'Monica for Android/gradlew.bat'
      - '.github/workflows/main.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-ci:
    name: Lint, test diagnostics, and debug build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: "Monica for Android"

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew :app:lintDebug --stacktrace --no-daemon

      - name: Run unit tests (diagnostic)
        continue-on-error: true
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-unit-test-reports
          path: |
            Monica for Android/app/build/reports/tests/testDebugUnitTest
            Monica for Android/app/build/test-results/testDebugUnitTest
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: List debug APK outputs
        run: find app/build/outputs/apk/debug -maxdepth 1 -type f -print || true

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: |
            Monica for Android/app/build/outputs/apk/debug/*.apk
            Monica for Android/app/build/outputs/apk/debug/*.APK
          retention-days: 7
          if-no-files-found: error
