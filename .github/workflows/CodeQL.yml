name: CodeQL Analysis

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.gradle.kts'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
      - 'Monica for Android/gradlew'
      - 'Monica for Android/gradlew.bat'
      - '.github/workflows/CodeQL.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.gradle.kts'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
      - 'Monica for Android/gradlew'
      - 'Monica for Android/gradlew.bat'
      - '.github/workflows/CodeQL.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: "Monica for Android"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended

      - name: Build for CodeQL
        run: ./gradlew :app:assembleDebug --console=plain --stacktrace --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
          upload: true
