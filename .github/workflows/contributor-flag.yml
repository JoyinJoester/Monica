name: Update Contributor Flag

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p .github/assets

      - uses: JoyinJoester/North-Korea-Flag@main
        with:
          blue: '#a7f3d0'
          red: '#8ab4f8'
          icon-url: 'https://raw.githubusercontent.com/JoyinJoester/Monica/main/image/newiconweb.png'
          icon-scale: '1.0'
          count: '3'
          output: '.github/assets/contributor-flag.svg'
