name: Android Preview Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Monica for Android/**/*.kt'
      - 'Monica for Android/**/*.java'
      - 'Monica for Android/**/*.xml'
      - 'Monica for Android/**/*.gradle'
      - 'Monica for Android/**/*.kts'
      - 'Monica for Android/gradle/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-preview:
    name: Build & Publish Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Monica for Android"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Monica for Android/**/*.gradle*', 'Monica for Android/**/gradle-wrapper.properties') }}
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Validate signing secrets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          missing=0
          for name in DEBUG_KEYSTORE_BASE64 DEBUG_STORE_PASSWORD DEBUG_KEY_ALIAS DEBUG_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing signing secret::$name is empty or unavailable."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          DEBUG_STORE_PASSWORD: ${{ secrets.DEBUG_STORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
          if [ ! -s "$GITHUB_WORKSPACE/release.jks" ]; then
            echo "::error title=Keystore decode failed::release.jks was not created or is empty."
            exit 1
          fi
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Verify keystore credentials
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          keytool -list \
            -keystore "$GITHUB_WORKSPACE/release.jks" \
            -storepass "${{ secrets.DEBUG_STORE_PASSWORD }}" \
            -alias "${{ secrets.DEBUG_KEY_ALIAS }}" >/dev/null
          echo "Keystore, password, and alias validated successfully."
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Generate preview version suffix
        id: preview_meta
        shell: bash
        run: |
          suffix="build.$(date -u +%Y%m%d%H%M)"
          echo "PREVIEW_VERSION_SUFFIX=$suffix" >> "$GITHUB_ENV"
          echo "preview_version_suffix=$suffix" >> "$GITHUB_OUTPUT"

      - name: Build Debug APK for PR validation
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleDebug --stacktrace -PpreviewVersionSuffix=$PREVIEW_VERSION_SUFFIX

      - name: Build Release APK
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --stop
          ./gradlew :app:assembleRelease \
            --no-daemon \
            --stacktrace \
            --info \
            -Pkotlin.incremental=false \
            -Dkotlin.compiler.execution.strategy=in-process \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.DEBUG_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.DEBUG_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.DEBUG_KEY_PASSWORD }} \
            -PpreviewVersionSuffix=$PREVIEW_VERSION_SUFFIX \
            2>&1 | tee "$RUNNER_TEMP/preview-build.log"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Upload preview build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-log
          path: ${{ runner.temp }}/preview-build.log
          if-no-files-found: ignore

      - name: Collect generated APK metadata
        id: preview_apk_meta
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd app/build/outputs/apk/release

          apk_list="$(find . -maxdepth 1 -type f \( -iname '*.apk' \) -printf '%f\n' | sort)"
          apk_count="$(printf '%s\n' "$apk_list" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$apk_count" = "0" ]; then
            echo "No release APK found"
            ls -la
            exit 1
          fi

          first_apk="$(printf '%s\n' "$apk_list" | sed '/^$/d' | head -n 1)"

          echo "Detected release APKs:"
          printf '%s\n' "$apk_list" | sed '/^$/d' | sed 's/^/ - /'
          echo "PREVIEW_APK_NAME=${first_apk}" >> "$GITHUB_ENV"
          echo "PREVIEW_APK_COUNT=${apk_count}" >> "$GITHUB_ENV"
          echo "preview_apk_name=${first_apk}" >> "$GITHUB_OUTPUT"
          echo "preview_apk_count=${apk_count}" >> "$GITHUB_OUTPUT"

      - name: Delete existing preview release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          check_output=$(gh api repos/${{ github.repository }}/releases/tags/preview 2>&1)
          check_rc=$?
          set -e

          if [ "$check_rc" -eq 0 ]; then
            gh release delete preview --yes --cleanup-tag
          elif echo "$check_output" | grep -qi "404"; then
            echo "No existing preview release to delete"
          else
            echo "::error title=Failed to query preview release::${check_output}"
            exit 1
          fi

      - name: Move preview tag to current commit
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa preview ${{ github.sha }} -m "Development Preview"
          git push origin refs/tags/preview --force

      - name: Publish Preview to Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: "⚠️ Development Preview (${{ steps.preview_meta.outputs.preview_version_suffix }})"
          body: |
            > **⚠️ 注意：这是一个自动构建的开发预览版本 (Development Preview)**
            > 
            > 此版本用于快速体验最新代码，可能包含未完成的功能或 Bug。
            > 正式使用请下载下面的 Stable 版本。
            > 但是实际上 Stable 版本可能不如这个预览版本更新，毕竟 Stable 版本需要经过更多的测试和验证。
            > 预览版本可能会更快地包含最新的功能和修复，但也可能更不稳定。
            > ---
            > **构建信息：**
            > *   **Build Suffix**: `${{ steps.preview_meta.outputs.preview_version_suffix }}`
            > *   **Generated APK**: `${{ steps.preview_apk_meta.outputs.preview_apk_name }}`
            > *   **Commit SHA**: `${{ github.sha }}`
            > *   **Ref**: `${{ github.ref }}`
          files: |
            Monica for Android/app/build/outputs/apk/release/*.apk
            Monica for Android/app/build/outputs/apk/release/*.APK
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
